<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Point Blank Murah</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 15px 20px;
  font-weight: bold;
  color: #22c55e;
  font-size: 20px;
}

.banner {
  padding: 30px;
  text-align: center;
  background: linear-gradient(135deg, #22c55e, #15803d);
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

h3 {
  margin-top: 0;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  margin-top: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 10px;
}

.item {
  padding: 12px;
  background: #334155;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
}

.item:hover {
  background: #22c55e;
  color: black;
}

.active {
  border: 2px solid #22c55e;
  background: #16a34a;
}

.summary {
  background: #020617;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>
POINT BLANK TOP UP
</header>

<div class="banner">
  <h1>Top Up PB Cash ⚡</h1>
  <p>Proses Cepat & Otomatis</p>
</div>

<div class="container">

  <!-- STEP 1 -->
  <div class="card">
    <h3>1. Masukkan Data</h3>
    <input type="text" id="userId" placeholder="User ID">
    <input type="text" id="nickname" placeholder="Nickname">
  </div>

  <!-- STEP 2 -->
  <div class="card">
    <h3>2. Pilih Nominal</h3>

    <div class="grid">
      <div class="item" onclick="select(this,'1200 Cash - Rp10.000')">1200 Cash</div>
      <div class="item" onclick="select(this,'2400 Cash - Rp20.000')">2400 Cash</div>
      <div class="item" onclick="select(this,'6000 Cash - Rp50.000')">6000 Cash</div>
      <div class="item" onclick="select(this,'12000 Cash - Rp100.000')">12000 Cash</div>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="card">
    <h3>3. Ringkasan</h3>
    <div class="summary" id="summary">
      Belum ada data
    </div>

    <button onclick="checkout()">Beli Sekarang</button>
  </div>

</div>

<footer>
© 2026 PB Store
</footer>

<script>
let selectedNominal = "";

function select(el, nominal) {
  let items = document.querySelectorAll('.item');
  items.forEach(i => i.classList.remove('active'));

  el.classList.add('active');
  selectedNominal = nominal;

  updateSummary();
}

function updateSummary() {
  let id = document.getElementById("userId").value;
  let nick = document.getElementById("nickname").value;

  document.getElementById("summary").innerHTML =
    "ID: " + (id || "-") + "<br>" +
    "Nickname: " + (nick || "-") + "<br>" +
    "Nominal: " + (selectedNominal || "-");
}

document.getElementById("userId").addEventListener("input", updateSummary);
document.getElementById("nickname").addEventListener("input", updateSummary);

function checkout() {
  let id = document.getElementById("userId").value;
  let nick = document.getElementById("nickname").value;

  if (!id || !nick || !selectedNominal) {
    alert("Lengkapi semua data!");
    return;
  }

  let text = `Halo admin, saya mau top up Point Blank\nID: ${id}\nNickname: ${nick}\nNominal: ${selectedNominal}`;

  let wa = "https://wa.me/628xxxxxxxxxx?text=" + encodeURIComponent(text);
  window.open(wa, "_blank");
}
</script>

</body>
</html>
